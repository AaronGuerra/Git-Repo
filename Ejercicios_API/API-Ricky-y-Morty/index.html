
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumiendo API Rick & Morty</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h1>Personajes de Rick and Morty</h1>
        <button id="btnPersonaje">Cargar Personaje Aleatorio</button>
        
        <div id="character-container" class="card" style="display: none;">
            <img id="char-img" src="" alt="Imagen del personaje">
            <h2 id="char-name"></h2>
            <p><strong>Estado:</strong> <span id="char-status"></span></p>
            <p><strong>Especie:</strong> <span id="char-species"></span></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
