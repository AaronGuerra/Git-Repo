<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick and Morty - Archivo Interdimensional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="container text-center my-5">
        <h1>RICK AND MORTY</h1>   
        <p class="subtitulo">Archivo de Personajes y Criaturas</p>
        
        <div class="row justify-content-center g-2 max-width-controles mx-auto">
            <div class="col-md-6">
                <input type="text" id="input-busqueda" class="form-control" placeholder="Buscar por nombre (Ej: Rick, Morty, Summer)...">
            </div>
            <div class="col-sm-auto col-4">
                <button id="btn-buscar" class="btn-personalizado w-100">Buscar</button>
            </div>
            <div class="col-sm-auto col-4">
                <button id="btn-todos" class="btn-personalizado btn-azul w-100">Aleatorio</button>
            </div>
            <div class="col-sm-auto col-4">
                <button id="btn-limpiar" class="btn-personalizado btn-morado w-100">Limpiar</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="contenedor-tarjetas" class="grid-personajes"></div>
    </main>

    <div class="modal fade" id="modalDetalles" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content text-white shadow-lg">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-titulo">Nombre del Personaje</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modal-cuerpo">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
